<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caspian Routes | Premium B2B Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div id="auth-loader" class="auth-loader"><div class="spinner"></div></div>

    <header class="app-header" id="main-header">
        <div class="header-left">
            <span class="logo-text" id="nav-logo" onclick="if(window.render && window.currentPage !== 'login' && window.currentPage !== 'register') window.render(window.currentUserRole === 'buyer' ? 'showcase' : (window.currentUserRole === 'admin' ? 'home' : 'extranet'))">
                <i class="fas fa-water"></i> CASPIAN<b>ROUTES</b>
            </span>
        </div>
        
        <div class="header-right">
            <div id="main-navigation" style="display: flex; gap: 15px; align-items: center;">
                <button id="nav-dashboard" class="btn-outline">
                    <i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span>
                </button>
                <button id="nav-inventory" class="btn-outline">
                    <i class="fas fa-box-open"></i> <span data-i18n="inventory">Inventory</span>
                </button>
                <button id="nav-bookings" class="btn-outline">
                    <i class="fas fa-shopping-bag"></i> <span data-i18n="bookings">Bookings</span>
                </button>
                <button id="nav-partners" class="btn-outline">
                    <i class="fas fa-users"></i> <span data-i18n="partners">Partners</span>
                </button>
                <button id="nav-profile" class="btn-outline">
                    <i class="fas fa-building"></i> <span data-i18n="profile">Profile</span>
                </button>
            </div>
            
            <div class="lang-dropdown" id="lang-switch">
                <i class="fas fa-globe dropbtn"></i>
                <div class="dropdown-content" id="lang-menu">
                    <span data-lang="en">English</span>
                    <span data-lang="ru">Русский</span>
                    <span data-lang="az">Azərbaycan</span>
                </div>
            </div>
            
            <button id="logout-btn" class="btn-outline-danger" style="display: none;" onclick="window.logout()">
                <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </header>

    <main class="content-area" id="app-content"></main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDu9U3SgE2bra7Z36bnAec5dXLhZq3KQR0",
        authDomain: "caspianapp-c5d1c.firebaseapp.com",
        projectId: "caspianapp-c5d1c",
        databaseURL: "https://caspianapp-c5d1c-default-rtdb.firebaseio.com/",
        storageBucket: "caspianapp-c5d1c.firebasestorage.app", 
        appId: "1:17997434765:web:fe856309a8c687d8aef7c4"
      };

      const app = initializeApp(firebaseConfig);
      window.db = getDatabase(app);
      window.dbFunc = { ref, push, set, onValue, remove, update };
      window.auth = getAuth(app);
      window.authFunc = { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence };
      window.storage = getStorage(app);
      window.storageFunc = { storageRef, uploadBytes, getDownloadURL };
    </script>
    <script type="module" src="app2.js?v=3"></script>
</body>
</html>
