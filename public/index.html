<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caspian DMC Aggregator</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && event.reason.message && event.reason.message.includes('Could not establish connection')) {
                event.preventDefault(); 
                console.warn('🛡️ [Caspian DMC] Заблокирован конфликт Chrome-расширения.');
            }
        });
    </script>
</head>
<body>
    <div id="auth-loader" class="auth-loader"><div class="spinner"></div></div>

    <header class="app-header">
        <div class="header-left">
            <span class="logo-text" onclick="window.render('home')" style="cursor: pointer;">CASPIAN<b>DMC</b></span>
        </div>
        <div class="header-right">
            <div id="dynamic-header-actions" class="dynamic-actions-container"></div>
            
            <div class="lang-dropdown" id="langDropdown">
                <i class="fas fa-globe dropbtn" id="langBtn"></i>
                <div class="dropdown-content" id="langMenu">
                    <span data-lang="en">EN</span>
                    <span data-lang="az">AZ</span>
                    <span data-lang="ru">RU</span>
                </div>
            </div>
        </div>
    </header>

    <div class="content-area"><main class="content" id="app-content"></main></div>

    <nav class="bottom-nav" style="display: none;">
        <button onclick="window.render('home')" id="nav-home"><i class="fas fa-chart-line"></i><span data-i18n="dashboard">Dashboard</span></button>
        <button onclick="window.render('inventory')" id="nav-inventory"><i class="fas fa-box-open"></i><span data-i18n="inventory">Inventory</span></button>
        <button onclick="window.render('bookings')" id="nav-bookings"><i class="far fa-calendar-check"></i><span data-i18n="nav_bookings">Bookings</span></button>
        <button onclick="window.render('partners')" id="nav-partners"><i class="fas fa-handshake"></i><span data-i18n="nav_partners">Partners</span></button>
        
        <button onclick="window.render('profile')" id="nav-profile" style="display: none;"><i class="fas fa-user-shield"></i><span data-i18n="nav_profile">Profile</span></button>
        <button onclick="window.render('login')" id="nav-login" style="display: none;"><i class="fas fa-sign-in-alt"></i><span data-i18n="nav_login">Login</span></button>
        <button onclick="window.logout()" id="nav-logout" class="logout-nav-btn" style="display: none;"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Logout</span></button>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const langBtn = document.getElementById('langBtn');
            const langMenu = document.getElementById('langMenu');
            const langItems = langMenu.querySelectorAll('span');

            // 1. Открытие/закрытие меню по клику на глобус
            langBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                langMenu.classList.toggle('show-menu');
            });

            // 2. Скрытие меню при клике в любое другое место
            document.addEventListener('click', () => {
                if (langMenu.classList.contains('show-menu')) {
                    langMenu.classList.remove('show-menu');
                }
            });

            // 3. Обработка клика по конкретному языку (Event Listeners)
            langItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selectedLang = e.target.getAttribute('data-lang');
                    
                    if (window.setLanguage) {
                        window.setLanguage(selectedLang); // Вызов функции i18n
                    }
                    langMenu.classList.remove('show-menu'); // Сразу закрываем меню
                });
            });
        });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDu9U3SgE2bra7Z36bnAec5dXLhZq3KQR0",
        authDomain: "caspianapp-c5d1c.firebaseapp.com",
        projectId: "caspianapp-c5d1c",
        databaseURL: "https://caspianapp-c5d1c-default-rtdb.firebaseio.com/",
        storageBucket: "caspianapp-c5d1c.firebasestorage.app", // <--- КРИТИЧЕСКИЙ ФИКС ЗДЕСЬ
        appId: "1:17997434765:web:fe856309a8c687d8aef7c4"
      };

      const app = initializeApp(firebaseConfig);
      
      window.db = getDatabase(app);
      window.dbFunc = { ref, push, set, onValue, remove, update };
      
      window.auth = getAuth(app);
      window.authFunc = { signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence };
      
      window.storage = getStorage(app);
      window.storageFunc = { storageRef, uploadBytes, getDownloadURL };
    </script>
    <script type="module" src="app2.js"></script>
</body>
</html>
